<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora - Métodos Numéricos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <!-- MathJax -->
    <script>
        MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], displayMath: [['$$', '$$'], ['\\[', '\\]']] },
            svg: { fontCache: 'global' }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3.2.2/es5/tex-svg.js" async></script>
</head>
<body>
    <header class="app-header">
        <div class="logo">Métodos <span>Numéricos</span></div>
        <button class="theme-toggle" id="themeToggle">🌙 Modo oscuro</button>
    </header>

    <main class="content">
        <div class="content-header">
            <a href="index.html" class="btn-back">← Volver al inicio</a>
            <span class="content-title">🧮 Calculadora</span>
        </div>

        <!-- Selector de calculadoras -->
        <div class="calc-selector" id="calcSelector"></div>

        <!-- Contenedor de la calculadora activa -->
        <div class="calc-container" id="calcContainer">
            <p style="color: var(--text-muted); text-align: center; padding: 2rem;">
                Selecciona una calculadora del menú superior.
            </p>
        </div>
    </main>

    <script src="nm-core.js"></script>
    <script src="data.js"></script>
    <script src="theory.js"></script>
    <script src="main.js"></script>
    <script src="theme.js"></script>
</body>
</html>
